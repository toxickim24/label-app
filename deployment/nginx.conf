# Nginx Configuration for Label App
# Domain: web.labelsalesagents.com
# Location: /etc/nginx/sites-available/label-app

server {
    listen 80;
    listen [::]:80;

    server_name web.labelsalesagents.com;

    # Root directory for the static files
    root /var/www/label-app/dist;
    index index.html;

    # Access and error logs
    access_log /var/log/nginx/label-app-access.log;
    error_log /var/log/nginx/label-app-error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # Handle client-side routing (React Router, etc.)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~ /\.(?:htaccess|htpasswd|env|git) {
        deny all;
    }

    # Increase max body size for file uploads (adjust as needed)
    client_max_body_size 10M;
}

# HTTPS configuration (this will be added automatically by Certbot)
# When you run the SSL setup script, Certbot will modify this file
# to add the HTTPS (port 443) configuration
